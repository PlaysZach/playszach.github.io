<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Chat Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
    }
  
    #chat-box {
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 10px;
      box-sizing: border-box;
      background: transparent;
    }
  
    .yt-chat-message {
      display: flex;
      align-items: flex-start;
      margin-bottom: 8px;
    }
  
    .yt-chat-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      margin-right: 8px;
    }
  
    .yt-chat-content-inline {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
  
    .yt-chat-author {
      font-weight: bold;
      font-size: 13px;
    }
  
    .yt-chat-text {
      color: white;
      font-size: 14px;
      margin-left: 2px;
    }
  </style>  
</head>
<body>

  <div id="chat-box">Loading chat...</div>

  <script src="chat.js"></script>

</body>
</html>
