<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Chat Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
    }
  
    #chat-box {
      position: relative;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 10px;
      box-sizing: border-box;
      background: transparent;
    }
  
    .yt-chat-message {
      display: flex;
      align-items: flex-start;
      margin-bottom: 8px;
    }
  
    .yt-chat-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      margin-right: 8px;
    }
  
    .yt-chat-content {
      display: inline-flex;
      flex-direction: column;
      max-width: 80%;
    }
  
    .yt-chat-author {
      background-color: #ffd600;
      color: #000;
      font-weight: bold;
      border-radius: 12px;
      padding: 4px 8px;
      display: inline-block;
      margin-bottom: 2px;
      font-size: 13px;
    }
  
    .yt-chat-text {
      color: white;
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 10px;
      border-radius: 12px;
      font-size: 14px;
      max-width: 100%;
      word-wrap: break-word;
    }
  </style>  
</head>
<body>

  <div id="chat-box">Loading chat...</div>

  <script src="chat.js"></script>

</body>
</html>
