<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Chat Filter</title>
    <style>
        /* You can include styles here if needed */
    </style>
</head>
<body>
    <iframe src="https://chat.truffle.vip/browser-source/PlaysZach/scene-1" style="width: 100%; height: 100%;" frameborder="0"></iframe>

    <script>
        // The code from the Tampermonkey script
        (function() {
            'use strict';

            const hideCommandMessages = () => {
                // Select all full message containers
                const messages = document.querySelectorAll('.c-chat-message');

                messages.forEach(msg => {
                    const body = msg.querySelector('.c-chat-message-body');
                    if (body && body.innerText.trim().startsWith('!')) {
                        msg.style.display = 'none';
                    }
                });
            };

            const observer = new MutationObserver(hideCommandMessages);

            const init = () => {
                observer.observe(document.body, {
                    childList: true,
                    subtree: true
                });
                hideCommandMessages(); // Initial sweep
            };

            window.addEventListener('load', () => {
                setTimeout(init, 500); // small delay to ensure DOM is ready
            });
        })();
    </script>
</body>
</html>
