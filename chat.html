<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Chat Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
    }
  
    #chat-box {
      position: relative;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 10px;
      box-sizing: border-box;
      background: transparent;
    }
  
    .yt-chat-message {
      display: flex;
      align-items: flex-start;
      margin-bottom: 8px;
    }
  
    .yt-chat-avatar {
      width: 28px; /* Smaller than before */
      height: 28px;
      border-radius: 50%;
      margin-right: 8px;
    }
  
    .yt-chat-content {
      display: inline-flex;
      flex-direction: column;
      max-width: 80%;
    }
  
    .yt-chat-author {
      background-color: #ffd600;
      color: #000;
      font-weight: bold;
      border-radius: 8px; /* More square, less pill */
      padding: 3px 7px;
      display: inline-block;
      font-size: 13px;
      margin-bottom: 1px;
    }
  
    .yt-chat-text {
      color: white;
      font-size: 14px;
      margin-top: 1px;
      margin-left: 1px;
      /* No background, no bubble */
    }
  </style>  
</head>
<body>

  <div id="chat-box">Loading chat...</div>

  <script src="chat.js"></script>

</body>
</html>
