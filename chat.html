<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Chat Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
    }
  
    #chat-box {
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      box-sizing: border-box;
      background: transparent;
    }
  
    .yt-chat-message {
      display: flex;
      align-items: flex-start; /* align to top of avatar */
      margin-bottom: 6px;
    }
  
    .yt-chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 12px;
    }
  
    .yt-chat-content-inline {
      display: flex;
      flex-direction: column; /* stack name + message vertically */
    }
  
    .yt-chat-author {
      font-weight: bold;
      font-size: 22px;
      padding: 6px 8px;
      border-radius: 8px;
      line-height: 1.2;
      margin-bottom: 4px; /* space between name and message */
    }
  
    .yt-chat-text {
      color: white;
      font-size: 22px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div id="chat-box">Loading chat...</div>

  <script src="chat.js"></script>

</body>
</html>
