<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Chat Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
    }
  
    #chat-box {
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;  /* Increased padding */
      box-sizing: border-box;
      background: transparent;
    }
  
    .yt-chat-message {
      display: flex;
      align-items: flex-start;
      margin-bottom: 12px;  /* Increased margin between messages */
    }
  
    .yt-chat-avatar {
      width: 40px;  /* Increased profile picture size */
      height: 40px;  /* Increased profile picture size */
      border-radius: 50%;
      margin-right: 12px;  /* Increased space between avatar and text */
    }
  
    .yt-chat-content-inline {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;  /* Increased gap between username and message */
    }
  
    .yt-chat-author {
      font-weight: bold;
      font-size: 18px;  /* Increased font size for author */
      padding: 6px 12px;  /* Increased padding for the author bubble */
      border-radius: 8px;  /* Slightly larger rounded corners */
    }
  
    .yt-chat-text {
      color: white;
      font-size: 16px;  /* Increased font size for text */
      margin-left: 4px;  /* Increased space between text and author */
    }
  </style>
</head>
<body>

  <div id="chat-box">Loading chat...</div>

  <script src="chat.js"></script>

</body>
</html>
