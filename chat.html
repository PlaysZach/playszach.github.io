<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Chat Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Roboto", Arial, sans-serif;
    }

    #chat-box {
      font-size: 13px;
      max-height: 500px;
      overflow-y: auto;
      padding: 10px;
      background-color: #fff;
      color: #000;
    }

    .yt-chat-message {
      display: flex;
      align-items: flex-start;
      margin-bottom: 10px;
      padding: 4px 0;
    }

    .yt-chat-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .yt-chat-content {
      display: flex;
      flex-direction: row;
      align-items: center;
      flex-wrap: wrap;
      max-width: calc(100% - 42px);
      word-break: break-word;
    }

    .yt-chat-author {
      font-weight: bold;
      color: #ffe600;
      margin-right: 5px;
    }

    .yt-chat-text {
      line-height: 1.4;
      color: #000;
    }
  </style>
</head>
<body>

  <div id="chat-box">Loading chat...</div>

  <script src="chat.js"></script>

</body>
</html>
