<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zach's Live Chat</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      box-sizing: border-box;
    }

    #chat-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div id="chat-container">Loading chat…</div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('v');

    if (videoId) {
      const iframe = document.createElement('iframe');
      iframe.src = `https://www.youtube.com/live_chat?v=${videoId}&embed_domain=playszach.github.io`;
      iframe.allowFullscreen = true;
      iframe.style.width = "100%";
      iframe.style.height = "100%";
      iframe.style.border = "none";

      document.getElementById('chat-container').innerHTML = '';
      document.getElementById('chat-container').appendChild(iframe);
    } else {
      document.getElementById('chat-container').innerText = 'No video ID provided, use ?v=VIDEO_ID at the end of the URL eg. https://playszach.github.io/chat/?v=jfKfPfyJRdk';
    }
  </script>
</body>
</html>
