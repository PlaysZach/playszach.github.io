<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zach's YouTube Live Chat</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div id="chat-container">Loading chat…</div>

  <script>
    // Get the video ID from the URL (e.g., ?v=VIDEO_ID)
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('v');

    if (videoId) {
      const iframe = document.createElement('iframe');
      iframe.src = `https://www.youtube.com/live_chat?v=${videoId}&embed_domain=playszach.github.io`;
      iframe.allowFullscreen = true;
      iframe.style.width = "100%";
      iframe.style.height = "100%";
      iframe.style.border = "none";

      document.getElementById('chat-container').innerHTML = '';
      document.getElementById('chat-container').appendChild(iframe);
    } else {
      document.getElementById('chat-container').innerText = 'No video ID provided. Use ?v=VIDEO_ID in the URL.';
    }
  </script>
</body>
</html>
